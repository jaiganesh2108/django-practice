{% extends "master.html" %}

{% block title %}
  My Tennis Club
{% endblock %}


{% block content %}
  <style>
    .tennis-hero {
      min-height: 80vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(135deg, #eafff0 0%, #ffffff 100%);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      box-sizing: border-box;
    }

    .tennis-hero h1 {
      font-size: 3.5rem;
      color: #14532d;
      margin-bottom: 0.5rem;
    }

    .tennis-hero .subtitle {
      font-size: 1.4rem;
      color: #4b5563;
      margin-bottom: 2rem;
      font-weight: 500;
    }

    .tennis-hero p {
      font-size: 1.15rem;
      color: #374151;
      margin-bottom: 2rem;
      max-width: 500px;
    }

    .members-btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      background-color: #16a34a;
      color: #ffffff;
      font-weight: 600;
      font-size: 1.1rem;
      text-decoration: none;
      border-radius: 8px;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .members-btn:hover {
      background-color: #15803d;
      transform: translateY(-2px);
    }
  </style>

  <div class="tennis-hero">
    <h1>🎾 My Tennis Club</h1>
    <p class="subtitle">Where every rally counts</p>

    <p>Meet the players who make this club what it is.</p>

    <a class="members-btn" href="members/">View Our Members</a>
  </div>
{% endblock %}
